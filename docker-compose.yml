services:
  postgres:
    image: postgres:16
    container_name: webhook-psql
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - webhook_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    container_name: webhook-migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    command: sh -c "npx drizzle-kit migrate --config=drizzle.config.ts"
    restart: "no"

  api:
    build: .
    container_name: webhook-api
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    ports:
      - "3000:3000"

  worker:
    build: .
    container_name: webhook-worker
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    command: node dist/modules/workers/worker.js

volumes:
  webhook_db_data: