services:
  postgres:
    image: postgres:16
    container_name: webhook-psql
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - webhook_db_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: webhook-api
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "3000:3000"
    

  worker:
    build: .
    container_name: webhook-worker
    depends_on:
      - postgres
    env_file:
      - .env
    command: node dist/modules/workers/worker.js

volumes:
  webhook_db_data: