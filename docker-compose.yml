services: 
postgres:
  image: postgres:16
  container_name: webhook-psql
  environment:
    POSTGRES_USER: ${DB_USER}
    POSTGRES_PASSWORD: ${DB_PASSWORD}
    POSTGRES_DB: ${DB_NAME}
  ports:
    - "5432:5432"
  volumes:
    - webhook_db_data:/var/lib/postgresql/data
volumes:
  webhook_db_data:
    